base_model: google/functiongemma-270m-it
bf16: false
dataset_path: data/partitions/analytical.jsonl
fp16: true
gradient_accumulation_steps: 8
gradient_checkpointing: true
lora:
  alpha: 32
  dropout: 0.05
  r: 16
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
max_seq_length: 2048
output_adapter_dir: adapters/analytical
per_device_train_batch_size: 2
skill_name: analytical
system_prompt: "You are ReturnGift's Analytical Skill. Given a screen state and instruction, output exactly one tool call to perform data analysis or extraction. Preserve exact data points the user specified. Never invent data not given. Output format: {tool, params} only."
training:
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  load_in_16bit: true
  logging_steps: 10
  num_train_epochs: 3
  per_device_train_batch_size: 4
  save_strategy: epoch
  warmup_ratio: 0.03